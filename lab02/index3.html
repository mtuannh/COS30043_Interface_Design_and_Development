<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Lab 02 - Bootstrap Grid</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"> 
    <style> 
        /* Helper style to visualise grid columns */ 
        .grid-demo { 
            background-color: #e7f1ff; 
            border: 1px solid #b6d4fe; 
            padding: 12px; 
            margin-bottom: 10px; 
            text-align: center; 
            border-radius: 4px; 
        } 
    </style> 
</head> 
<body> 

    <div class="container"> 
    <h2>Basic Grid</h2> 
    <div class="row"> 
    <div class="col"> 
        <div class="grid-demo">col (auto)</div> 
    </div> 
    <div class="col"> 
        <div class="grid-demo">col (auto)</div> 
    </div> 
    <div class="col"> 
        <div class="grid-demo">col (auto)</div> 
    </div> 
    </div> 

    <div class="container my-4"> 
    <h2>Responsive Breakpoints</h2> 
    <div class="row"> 
        <div class="col-12 col-md-6 col-lg-4"> 
            <div class="grid-demo">col-12 col-md-6 col-lg-4</div> 
        </div> 
        <div class="col-12 col-md-6 col-lg-4"> 
            <div class="grid-demo">col-12 col-md-6 col-lg-4</div> 
        </div>
        <div class="col-12 col-md-6 col-lg-4"> 
            <div class="grid-demo">col-12 col-md-6 col-lg-4</div> 
        </div> 
    </div> 
</div>

    <div class="row"> 
        <div class="col-4"> 
            <div class="grid-demo">col-4</div> 
        </div> 
        <div class="col-4"> 
            <div class="grid-demo">col-4</div> 
        </div> 
        <div class="col-4"> 
            <div class="grid-demo">col-4</div> 
        </div> 
    </div> 
    <div class="row"> 
        <div class="col-3"> 
            <div class="grid-demo">col-3</div> 
        </div> 
        <div class="col-9"> 
            <div class="grid-demo">col-9</div> 
        </div> 
    </div> 
</div>

    <script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"> 
    </script> 
</body> 
</html>
